# playbook.yml
---
- name: Instalează și utilizează locate pentru a găsi fișiere
  hosts: all
  become: true

  vars_files:
    - locate-files.yml

  tasks:

    - name: Instalează locate pe Ubuntu
      apt:
        name: plocate
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Actualizează baza de date locate
      command: updatedb

    - name: Caută fișierele folosind locate
      shell: "locate {{ item }}"
      loop: "{{ files_to_locate }}"
      register: locate_results
      changed_when: false

    - name: Afișează rezultatele
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ locate_results.results }}"